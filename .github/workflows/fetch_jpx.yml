name: JPX Options Data Fetch

on:
  schedule:
    # 19:00 JST (10:00 UTC) - 理論価格CSV取得
    - cron: '0 10 * * 1-5'
    # 21:00 JST (12:00 UTC) - 建玉残高Excel取得（20:00公開後）
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '取得日付 (YYYYMMDD) ※空欄で最新営業日'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-options-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas numpy scipy openpyxl

      - name: Fetch JPX Options CSV (理論価格・IV)
        env:
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python scripts/fetch_jpx.py

      - name: Fetch JPX OI Excel (建玉残高・実OI)
        env:
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python scripts/fetch_oi.py
        continue-on-error: true

      - name: Compute Greeks & Analysis
        run: python scripts/compute_analysis.py

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update JPX options data $(date '+%Y-%m-%d')"
          git push
